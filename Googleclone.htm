<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Google Clone - Improved</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #ffffff;
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --search-border: #dfe1e5;
            --search-bg: #ffffff;
            --btn-bg: #f8f9fa;
            --btn-text: #3c4043;
            --btn-hover-border: #dadce0;
            --footer-bg: #f2f2f2;
            --footer-text: #70757a;
            --suggestion-hover: #f5f5f5;
            --icon-fill: #5f6368;
        }

        body.dark {
            --bg-color: #202124;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --search-border: #5f6368;
            --search-bg: #303134;
            --btn-bg: #303134;
            --btn-text: #e8eaed;
            --btn-hover-border: #5f6368;
            --footer-bg: #171717;
            --footer-text: #9aa0a6;
            --suggestion-hover: #3c4043;
            --icon-fill: #9aa0a6;
        }

        body {
            font-family: arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.2s;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 20px 30px;
            font-size: 13px;
            gap: 15px;
        }

        .header a {
            color: var(--text-primary);
            text-decoration: none;
        }

        .header a:hover {
            text-decoration: underline;
        }

        .apps-icon, .theme-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: transparent;
            cursor: pointer;
        }

        .apps-icon:hover, .theme-toggle:hover {
            background-color: rgba(60, 64, 67, 0.08);
        }

        .apps-icon svg, .theme-toggle svg {
            fill: var(--icon-fill);
            height: 24px;
            width: 24px;
        }

        .sign-in-btn {
            background-color: #1a73e8;
            color: white !important;
            padding: 9px 23px;
            border-radius: 4px;
            font-weight: 500;
        }

        .sign-in-btn:hover {
            background-color: #2b7de9;
            text-decoration: none !important;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        /* Main */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .logo svg {
            width: 272px;
            height: 92px;
            margin-bottom: 25px;
        }

        /* Search container */
        .search-container {
            width: 100%;
            max-width: 584px;
            position: relative;
        }

        .search-box {
            display: flex;
            align-items: center;
            border: 1px solid var(--search-border);
            border-radius: 24px;
            padding: 5px 8px 5px 14px;
            background: var(--search-bg);
            transition: box-shadow 0.2s;
        }

        .search-box:hover, .search-box:focus-within {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: transparent;
        }

        .search-icon svg {
            fill: var(--text-secondary);
            height: 20px;
            width: 20px;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            padding: 12px 0;
            background: transparent;
            color: var(--text-primary);
        }

        .clear-btn, .voice-icon, .lens-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            cursor: pointer;
            border-radius: 50%;
            margin: 0 2px;
        }

        .clear-btn:hover, .voice-icon:hover, .lens-icon:hover {
            background-color: rgba(60, 64, 67, 0.08);
        }

        .clear-btn svg, .voice-icon svg, .lens-icon svg {
            height: 20px;
            width: 20px;
            fill: var(--text-secondary);
        }

        /* Suggestions dropdown */
        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--search-bg);
            border: 1px solid var(--search-border);
            border-top: none;
            border-radius: 0 0 24px 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-height: 400px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        .suggestions.show {
            display: block;
        }

        .suggestion-item {
            padding: 10px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--text-primary);
        }

        .suggestion-item:hover, .suggestion-item.selected {
            background-color: var(--suggestion-hover);
        }

        .suggestion-item svg {
            fill: var(--text-secondary);
            width: 18px;
            height: 18px;
        }

        /* Buttons */
        .buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 28px;
            flex-wrap: wrap;
        }

        .btn {
            background-color: var(--btn-bg);
            border: 1px solid transparent;
            border-radius: 4px;
            color: var(--btn-text);
            font-size: 14px;
            padding: 0 16px;
            line-height: 36px;
            cursor: pointer;
            transition: all 0.1s;
        }

        .btn:hover {
            border-color: var(--btn-hover-border);
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        .offered {
            margin-top: 28px;
            font-size: 13px;
            text-align: center;
            color: var(--text-secondary);
        }

        .offered a {
            color: #1a73e8;
            text-decoration: none;
            margin: 0 5px;
        }

        /* Footer */
        .footer {
            background-color: var(--footer-bg);
            color: var(--footer-text);
            font-size: 14px;
            margin-top: auto;
        }

        .footer-country {
            padding: 15px 30px;
            border-bottom: 1px solid var(--search-border);
        }

        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            padding: 15px 30px;
        }

        .footer-links-left a, .footer-links-right a {
            color: var(--footer-text);
            text-decoration: none;
            margin-right: 27px;
        }

        .footer-links-left a:hover, .footer-links-right a:hover {
            text-decoration: underline;
        }

        .footer-links-right a {
            margin-right: 0;
            margin-left: 27px;
        }

        @media (max-width: 600px) {
            .logo svg { width: 200px; height: auto; }
            .footer-links { flex-direction: column; align-items: center; gap: 15px; }
            .footer-links-left a, .footer-links-right a { margin: 0 12px; }
            .header { padding: 10px 15px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="#">Gmail</a>
        <a href="#">Images</a>
        <div class="apps-icon" aria-label="Google apps">
            <svg viewBox="0 0 24 24"><path d="M6,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM16,6c0,1.1 0.9,2 2,2s2,-0.9 2,-2 -0.9,-2 -2,-2 -2,0.9 -2,2zM12,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2z"/></svg>
        </div>
        <div class="theme-toggle" id="themeToggle" aria-label="Dark mode">
            <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
        </div>
        <a href="#" class="sign-in-btn">Sign in</a>
    </div>

    <div class="main">
        <div class="logo">
            <svg viewBox="0 0 272 92" xmlns="http://www.w3.org/2000/svg">
                <path fill="#EA4335" d="M115.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18 9.99-22.18 22.25-22.18 22.25 9.41 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44s-12.51 5.46-12.51 13.44 5.79 13.44 12.51 13.44 12.51-5.46 12.51-13.44z"/>
                <path fill="#FBBC05" d="M163.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18 9.99-22.18 22.25-22.18 22.25 9.41 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44s-12.51 5.46-12.51 13.44 5.79 13.44 12.51 13.44 12.51-5.46 12.51-13.44z"/>
                <path fill="#4285F4" d="M209.75 26.34v39.82c0 16.38-9.66 23.07-21.08 23.07-10.75 0-17.22-7.19-19.66-13.07l8.48-3.53c1.86 4.34 6.18 7.82 11.18 7.82 7.44 0 11.08-4.34 11.08-12.23v-3.53h-.27c-2.13 3.32-6.31 5.79-11.08 5.79-10.49 0-18.95-8.48-18.95-18.95 0-10.48 8.46-18.95 18.95-18.95 4.77 0 8.95 2.47 11.08 5.79h.27v-4.13h9.74zm-8.62 19.95c0-6.31-4.88-11.08-11.08-11.08s-11.08 4.77-11.08 11.08 4.88 11.08 11.08 11.08 11.08-4.77 11.08-11.08z"/>
                <path fill="#34A853" d="M258.75 24.62v41.54h-9.74v-4.13h-.27c-2.13 3.32-6.31 5.79-11.08 5.79-10.49 0-18.95-8.48-18.95-18.95 0-10.48 8.46-18.95 18.95-18.95 4.77 0 8.95 2.47 11.08 5.79h.27v-4.09h9.74zm-19.95 31.03c6.31 0 11.08-4.77 11.08-11.08s-4.77-11.08-11.08-11.08-11.08 4.77-11.08 11.08 4.77 11.08 11.08 11.08z"/>
                <path fill="#EA4335" d="M74.12 24.62v41.54h-9.74v-4.13h-.27c-2.13 3.32-6.31 5.79-11.08 5.79-10.49 0-18.95-8.48-18.95-18.95 0-10.48 8.46-18.95 18.95-18.95 4.77 0 8.95 2.47 11.08 5.79h.27v-4.09h9.74zm-19.95 31.03c6.31 0 11.08-4.77 11.08-11.08s-4.77-11.08-11.08-11.08-11.08 4.77-11.08 11.08 4.77 11.08 11.08 11.08z"/>
            </svg>
        </div>

        <div class="search-container">
            <form id="searchForm" action="https://www.google.com/search" method="GET">
                <div class="search-box">
                    <div class="search-icon">
                        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    </div>
                    <input type="text" class="search-input" name="q" id="searchInput" autocomplete="off" placeholder="Search Google or type a URL">
                    <div class="clear-btn" id="clearBtn" style="display: none;">
                        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                    </div>
                    <div class="voice-icon" id="voiceBtn">
                        <svg viewBox="0 0 24 24"><path d="M12 3c-1.66 0-3 1.37-3 3.07v5.86c0 1.7 1.34 3.07 3 3.07s3-1.37 3-3.07V6.07C15 4.37 13.66 3 12 3zm6.5 9h-1c0 2.76-2.24 5-5 5s-5-2.24-5-5h-1c0 3.04 2.21 5.55 5 5.95v2.55h-3v1h7v-1h-3v-2.55c2.79-.4 5-2.91 5-5.95z"/></svg>
                    </div>
                    <div class="lens-icon" id="lensBtn">
                        <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/><path d="M0 0h24v24H0z" fill="none"/></svg>
                    </div>
                </div>
                <div id="suggestions" class="suggestions"></div>
                <div class="buttons">
                    <button type="submit" class="btn">Google Search</button>
                    <button type="button" class="btn" id="luckyBtn">I'm Feeling Lucky</button>
                </div>
            </form>
            <div class="offered">
                Google offered in: <a href="#">हिन्दी</a> <a href="#">বাংলা</a> <a href="#">తెలుగు</a> <a href="#">मराठी</a> <a href="#">தமிழ்</a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-country">India</div>
        <div class="footer-links">
            <div class="footer-links-left">
                <a href="#">About</a>
                <a href="#">Advertising</a>
                <a href="#">Business</a>
                <a href="#">How Search works</a>
            </div>
            <div class="footer-links-right">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Settings</a>
            </div>
        </div>
    </footer>

    <script>
        // DOM elements
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');
        const voiceBtn = document.getElementById('voiceBtn');
        const lensBtn = document.getElementById('lensBtn');
        const luckyBtn = document.getElementById('luckyBtn');
        const searchForm = document.getElementById('searchForm');
        const suggestionsDiv = document.getElementById('suggestions');
        const themeToggle = document.getElementById('themeToggle');

        // --- Dark Mode ---
        function setTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            } else {
                document.body.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            }
        }

        function toggleTheme() {
            if (document.body.classList.contains('dark')) {
                setTheme('light');
            } else {
                setTheme('dark');
            }
        }

        // Load saved theme or system preference
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            setTheme(savedTheme);
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            setTheme('dark');
        }

        themeToggle.addEventListener('click', toggleTheme);

        // --- Clear button logic ---
        function toggleClearButton() {
            clearBtn.style.display = searchInput.value.length > 0 ? 'flex' : 'none';
        }
        searchInput.addEventListener('input', toggleClearButton);
        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            toggleClearButton();
            searchInput.focus();
            hideSuggestions();
        });

        // --- Google Suggest API (JSONP) ---
        let currentRequestId = 0;
        function fetchSuggestions(query) {
            if (!query.trim()) {
                hideSuggestions();
                return;
            }
            const requestId = ++currentRequestId;
            const script = document.createElement('script');
            const callbackName = `googleSuggestCallback_${requestId}`;
            window[callbackName] = (data) => {
                if (requestId !== currentRequestId) return;
                if (data && data[1] && data[1].length) {
                    showSuggestions(data[1]);
                } else {
                    hideSuggestions();
                }
                delete window[callbackName];
                document.body.removeChild(script);
            };
            const url = `https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(query)}&callback=${callbackName}`;
            script.src = url;
            document.body.appendChild(script);
            script.onerror = () => {
                if (requestId === currentRequestId) hideSuggestions();
                delete window[callbackName];
            };
        }

        function showSuggestions(suggestions) {
            if (!suggestions.length) {
                hideSuggestions();
                return;
            }
            suggestionsDiv.innerHTML = suggestions.map(s => `
                <div class="suggestion-item" data-query="${escapeHtml(s)}">
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5z"/></svg>
                    <span>${escapeHtml(s)}</span>
                </div>
            `).join('');
            suggestionsDiv.classList.add('show');
            // Attach click handlers
            document.querySelectorAll('.suggestion-item').forEach(item => {
                item.addEventListener('click', () => {
                    searchInput.value = item.dataset.query;
                    hideSuggestions();
                    searchForm.submit();
                });
            });
        }

        function hideSuggestions() {
            suggestionsDiv.classList.remove('show');
            suggestionsDiv.innerHTML = '';
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Debounce for suggestions
        let debounceTimer;
        searchInput.addEventListener('input', () => {
            toggleClearButton();
            clearTimeout(debounceTimer);
            const query = searchInput.value;
            debounceTimer = setTimeout(() => {
                fetchSuggestions(query);
            }, 200);
        });

        // Hide suggestions when clicking outside
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !suggestionsDiv.contains(e.target)) {
                hideSuggestions();
            }
        });

        // --- Voice Search (Web Speech API) ---
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
            voiceBtn.addEventListener('click', () => {
                recognition.start();
                voiceBtn.style.opacity = '0.6';
            });
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                searchInput.value = transcript;
                toggleClearButton();
                hideSuggestions();
                voiceBtn.style.opacity = '1';
                // Optional: auto-submit
                // searchForm.submit();
            };
            recognition.onerror = () => {
                voiceBtn.style.opacity = '1';
                alert('Voice recognition failed. Please try again.');
            };
            recognition.onend = () => {
                voiceBtn.style.opacity = '1';
            };
        } else {
            voiceBtn.addEventListener('click', () => alert('Voice search not supported in this browser. Try Chrome or Edge.'));
        }

        // --- Lens (Image Search) ---
        lensBtn.addEventListener('click', () => {
            const query = searchInput.value.trim();
            if (query) {
                window.location.href = `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(query)}`;
            } else {
                window.location.href = 'https://www.google.com/imghp';
            }
        });

        // --- I'm Feeling Lucky ---
        luckyBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const query = searchInput.value.trim();
            let url = 'https://www.google.com/search?q=';
            if (query) {
                url += encodeURIComponent(query) + '&btnI=I';
            } else {
                url += '&btnI=I';
            }
            window.location.href = url;
        });

        // Focus input on load
        searchInput.focus();
        toggleClearButton();
    </script>
</body>
</html>
